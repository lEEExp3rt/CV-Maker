name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Simulate GitHub Pages build to catch path/icon issues before merge
      - run: npm run build
        env:
          BASE_PATH: /CV-Maker/

      - name: Verify dist output
        run: |
          if [ ! -f dist/index.html ]; then echo "Missing index.html"; exit 1; fi
          if [ ! -d dist/assets ]; then echo "Missing assets/"; exit 1; fi
          if [ ! -d dist/icons ]; then echo "Missing icons/"; exit 1; fi
          echo "dist/ looks good"
