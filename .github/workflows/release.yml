name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version and notes from CHANGELOG
        id: changelog
        run: |
          VERSION=$(grep -oP '^## \[\K[0-9]+\.[0-9]+\.[0-9]+(?=\])' CHANGELOG.md | head -1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TITLE=$(sed -n '/^## \['"$VERSION"'\]/,/^$/p' CHANGELOG.md | head -1 | sed 's/^## \[.*\] — //; s/^## \[.*\]//')
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # Extract notes: from version heading to next "---" or next "## [" (whichever comes first)
          NOTES=$(awk '/^## \['"$VERSION"'\]/{flag=1; next} /^---$/{if(flag) exit} /^## \[/{if(flag) exit} flag' CHANGELOG.md)
          # Multi-line output
          echo 'notes<<EOF' >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.changelog.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.changelog.outputs.version }}
          name: v${{ steps.changelog.outputs.version }}${{ steps.changelog.outputs.title && ' — ' }}${{ steps.changelog.outputs.title }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
